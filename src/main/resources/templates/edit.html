<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký người dùng</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #ffffff);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        h3 {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card p-4" style="width: 100%; max-width: 500px;">
    <h3 class="text-center text-primary mb-4"> Edit người dùng </h3>

    <form th:action="@{/edituser}" th:object="${user}" method="POST">
        <input type="hidden" th:field="*{id}" />
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="first-name" class="form-label">First name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="${user.firstname}" id="first-name" name="firstname" required />
            </div>
            <div class="col-md-6 mb-3">
                <label for="last-name" class="form-label">Last name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="${user.lastname}" id="last-name" name="lastname" required />
            </div>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone <span class="text-danger">*</span></label>
            <input type="number" class="form-control" th:field="${user.phone}" id="phone" name="phone" required />
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email address <span class="text-danger">*</span></label>
            <input type="email" class="form-control" th:field="${user.email}" id="email" name="email" required />
            <div class="form-text">We'll never share your email with anyone else.</div>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" th:field="${user.password}" id="password" name="password" required />
        </div>

        <!-- Nút gửi -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">Sửa</button>
        </div>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="text-decoration-none">← Quay về trang chủ</a>
    </div>
</div>

</body>
</html>
