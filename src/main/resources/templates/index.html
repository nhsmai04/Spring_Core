<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <!-- Bootstrap 5 CDN (Đã sửa) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .action-btn {
            margin-right: 5px;
        }
        .btn-circle {
            width: 48px;
            height: 48px;
            padding: 6px 0;
            border-radius: 50%;
            text-align: center;
            font-size: 24px;
            line-height: 1.42857;
        }
    </style>
</head>
<body class="container py-5">

<h1 class="mb-4 text-center text-primary">🏠 Trang chủ</h1>

<!-- Bảng danh sách người dùng -->
<div class="card mb-4 shadow">
    <div class="card-header bg-info text-white">
        <h4 class="mb-0">📋 Danh sách người dùng</h4>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary text-center">
                <tr>
                    <th>ID</th>
                    <th>Họ</th>
                    <th>Tên</th>
                    <th>Điện thoại</th>
                    <th>Email</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody class="text-center">
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.lastname}">Nguyễn</td>
                    <td th:text="${user.firstname}">Văn A</td>
                    <td th:text="${user.phone}">0123456789</td>
                    <td th:text="${user.email}">email@example.com</td>
                    <td>
                        <a th:href="@{'/edit/' + ${user.id}}" class="btn btn-sm btn-warning action-btn">✏️</a>
                        <form th:action="@{/deleteuser/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return  confirm('Bạn có chắc chắn muốn xóa người dùng này?')">🗑️ Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" class="text-muted text-center py-3">Chưa có người dùng nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Nút thêm người dùng (hình tròn, chứa dấu +) -->
<div class="text-center">
    <a th:href="@{/new}" class="btn btn-success btn-circle" title="Thêm người dùng mới">+</a>
</div>

</body>
</html>
